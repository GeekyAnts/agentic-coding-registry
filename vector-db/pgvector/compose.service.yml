  pgvector:
    image: pgvector/pgvector:0.8.5-pg18-trixie
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - ./.data/pgvector:/var/lib/postgresql/data
      - ./initdb/pgvector:/docker-entrypoint-initdb.d:ro
